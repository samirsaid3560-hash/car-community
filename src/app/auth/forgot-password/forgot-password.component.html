<form [formGroup]="form" (ngSubmit)="submit()">
  <h2>Forgot Password</h2>
  
  <mat-form-field class="form-field">
    <mat-label>Email</mat-label>
    <input matInput type="email" formControlName="email" required placeholder="Enter your email address">
    <mat-error *ngIf="form.get('email')?.errors?.['required']">Email is required</mat-error>
    <mat-error *ngIf="form.get('email')?.errors?.['email']">Please enter a valid email</mat-error>
  </mat-form-field>

  <div class="actions">
    <a mat-button routerLink="/auth/login">Back to Login</a>
    <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || loading">
      Reset Password
      <mat-spinner class="spinner" diameter="20" *ngIf="loading"></mat-spinner>
    </button>
  </div>

  <div class="message success" *ngIf="message">{{ message }}</div>
  <div class="message error" *ngIf="error">{{ error }}</div>
</form>
