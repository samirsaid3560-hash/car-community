<div class="auth-card mat-elevation-z4">
  <h2>Reset Password</h2>

  <form [formGroup]="form" (ngSubmit)="submit()" *ngIf="!success">
    <mat-form-field class="form-field">
      <mat-label>New Password</mat-label>
      <input matInput [type]="hidePassword ? 'password' : 'text'" 
             formControlName="password"
             placeholder="Enter your new password"
             autocomplete="new-password" required>
      <button mat-icon-button matSuffix type="button"
              (click)="hidePassword = !hidePassword"
              [attr.aria-label]="hidePassword ? 'Show password' : 'Hide password'"
              [attr.aria-pressed]="!hidePassword">
        <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
      </button>
      <mat-error *ngIf="form.get('password')?.errors?.['required']">
        Password is required
      </mat-error>
      <mat-error *ngIf="form.get('password')?.errors?.['minlength']">
        Password must be at least 6 characters
      </mat-error>
    </mat-form-field>

    <div class="password-hint">
      Password must be at least 6 characters long
    </div>

    <mat-form-field class="form-field">
      <mat-label>Confirm Password</mat-label>
      <input matInput [type]="hideConfirmPassword ? 'password' : 'text'" 
             formControlName="confirmPassword"
             placeholder="Confirm your new password"
             autocomplete="new-password" required>
      <button mat-icon-button matSuffix type="button"
              (click)="hideConfirmPassword = !hideConfirmPassword"
              [attr.aria-label]="hideConfirmPassword ? 'Show password' : 'Hide password'"
              [attr.aria-pressed]="!hideConfirmPassword">
        <mat-icon>{{hideConfirmPassword ? 'visibility_off' : 'visibility'}}</mat-icon>
      </button>
      <mat-error *ngIf="form.get('confirmPassword')?.errors?.['required']">
        Please confirm your password
      </mat-error>
      <mat-error *ngIf="form.get('confirmPassword')?.errors?.['mismatch']">
        Passwords do not match
      </mat-error>
    </mat-form-field>

    <div *ngIf="error" class="error-message">
      {{ error }}
    </div>

    <div class="actions">
      <button mat-raised-button color="primary" type="submit" 
              [disabled]="form.invalid || loading">
        Reset Password
        <mat-spinner diameter="20" *ngIf="loading" class="spinner"></mat-spinner>
      </button>
    </div>
  </form>

  <div *ngIf="success" class="success-message">
    <mat-icon>check_circle</mat-icon>
    <h3>Password Reset Successful!</h3>
    <p>You will be redirected to login shortly...</p>
  </div>
</div>
