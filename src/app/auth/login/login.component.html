<div class="auth-card mat-elevation-z4">
  <h2>Login to Car Community</h2>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <mat-form-field class="form-field">
      <mat-label>Email</mat-label>
      <input matInput type="email" formControlName="email" 
             placeholder="Enter your email"
             autocomplete="email" required>
      <mat-error *ngIf="form.get('email')?.errors?.['required']">
        Email is required
      </mat-error>
      <mat-error *ngIf="form.get('email')?.errors?.['email']">
        Please enter a valid email address
      </mat-error>
    </mat-form-field>

    <mat-form-field class="form-field">
      <mat-label>Password</mat-label>
      <input matInput [type]="hidePassword ? 'password' : 'text'" 
             formControlName="password"
             placeholder="Enter your password"
             autocomplete="current-password" required>
      <button mat-icon-button matSuffix type="button"
              (click)="hidePassword = !hidePassword"
              [attr.aria-label]="hidePassword ? 'Show password' : 'Hide password'"
              [attr.aria-pressed]="!hidePassword">
        <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
      </button>
      <mat-error *ngIf="form.get('password')?.errors?.['required']">
        Password is required
      </mat-error>
      <mat-error *ngIf="form.get('password')?.errors?.['minlength']">
        Password must be at least 6 characters
      </mat-error>
    </mat-form-field>

    <div *ngIf="error" class="error-message mat-error">
      {{ error }}
    </div>

    <div class="actions">
      <button mat-raised-button color="primary" type="submit" 
              [disabled]="form.invalid || loading">
        Login
        <mat-spinner diameter="20" *ngIf="loading" class="spinner"></mat-spinner>
      </button>
    </div>

    <div class="links">
      <a mat-button routerLink="/auth/forgot-password">Forgot password?</a>
      <a mat-button routerLink="/auth/register" color="accent">Create account</a>
    </div>
  </form>
</div>
